<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --chartreuse:#B8D43A;--pine:#2B5C2F;--clay:#E06B4A;
  --buttercup:#FFC94D;--pale-herb:#B0EAAC;--peony:#F5A0C8;
  --cornflower:#A0B8F5;--wisteria:#D7A5FF;
  --font-display:"Shantell Sans",cursive;
  --font-botanical:"Caveat",cursive;
  --font-body:"Nunito",system-ui,sans-serif;
  --font-label:"Montserrat",system-ui,sans-serif;
}
[data-theme="dark"]{
  --bg:#181510;--bg-nav:#201C17;--bg-raised:rgba(242,232,201,.05);--bg-card:rgba(242,232,201,.04);
  --text-p:rgba(242,232,201,.94);--text-s:rgba(242,232,201,.70);
  --text-t:rgba(242,232,201,.48);--text-m:rgba(242,232,201,.34);
  --line:rgba(242,232,201,.10);--line-s:rgba(242,232,201,.18);
  --dot:rgba(242,232,201,.14);--gc:rgba(43,92,47,.22);--gcb:rgba(43,92,47,.38);
  --nav-accent:var(--chartreuse);--nav-active-bg:rgba(184,212,58,0.10);
  --input-bg:rgba(242,232,201,.06);
}
[data-theme="light"]{
  --bg:#FAF6EE;--bg-nav:#EDE8D4;--bg-raised:rgba(28,24,20,.05);--bg-card:rgba(28,24,20,.03);
  --text-p:rgba(28,24,20,.92);--text-s:rgba(28,24,20,.80);
  --text-t:rgba(28,24,20,.62);--text-m:rgba(28,24,20,.55);
  --line:rgba(28,24,20,.13);--line-s:rgba(28,24,20,.24);
  --dot:rgba(28,24,20,.12);--gc:rgba(43,92,47,.18);--gcb:rgba(43,92,47,.32);
  --nav-accent:var(--pine);--nav-active-bg:rgba(184,212,58,.28);
  --input-bg:rgba(28,24,20,.06);
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text-p);font-family:var(--font-body);transition:background .35s,color .2s}
#root{display:flex;height:100vh;overflow:hidden}
.cw{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.bc{padding:8px 24px;border-bottom:1px solid var(--line);font-family:var(--font-label);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-m);display:flex;align-items:center;gap:6px;flex-shrink:0;background:var(--bg-nav)}
.bc-link{cursor:pointer;color:var(--text-t)}
.bc-link:hover{color:var(--text-s)}
.cm{flex:1;overflow:hidden;position:relative}
.pi{height:100%;animation:pIn .22s ease}
@keyframes pIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.vs{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--pine),var(--chartreuse));transform-origin:left;animation:vsA .5s ease forwards;z-index:999;pointer-events:none}
@keyframes vsA{0%{transform:scaleX(0);opacity:1}70%{transform:scaleX(1);opacity:1}100%{transform:scaleX(1);opacity:0}}
@keyframes acceptGlow{0%{box-shadow:0 0 0 0 rgba(184,212,58,0)}35%{box-shadow:0 0 0 6px rgba(184,212,58,.3)}100%{box-shadow:0 0 0 0 rgba(184,212,58,0)}}
.af{animation:acceptGlow .7s ease}
.dg{background-image:radial-gradient(circle,var(--dot) 1px,transparent 1px);background-size:18px 18px}
.gg{background-image:linear-gradient(var(--gc) 1px,transparent 1px),linear-gradient(90deg,var(--gc) 1px,transparent 1px);background-size:20px 20px}
.nb{width:100%;display:flex;align-items:center;background:none;border:none;cursor:pointer;font-family:var(--font-label);font-size:11px;letter-spacing:.12em;text-transform:uppercase;transition:background .12s,color .12s;white-space:nowrap}
.nb:hover{background:var(--bg-raised)}
.hr{transition:background .1s}.hr:hover{background:var(--bg-raised)}
.cd{cursor:pointer;transition:background .1s;border-radius:3px}.cd:hover{background:var(--bg-raised)}
.chip{display:inline-flex;align-items:center;border-radius:999px;padding:4px 9px;font-family:var(--font-label);font-size:9px;font-weight:500;letter-spacing:.11em;text-transform:uppercase}
.pp{width:0;overflow:hidden;border-left:0 solid var(--line);flex-shrink:0;transition:width .3s,border-left-width .3s;display:flex;flex-direction:column}
.pp.open{width:272px;border-left-width:1px}
textarea{width:100%;background:transparent;border:none;outline:none;color:var(--text-p);font-family:var(--font-body);font-size:14px;line-height:1.65;resize:none;caret-color:var(--chartreuse)}
textarea::placeholder{color:var(--text-m);font-style:italic}
input,select{background:var(--input-bg);border:1px solid var(--line);border-radius:6px;color:var(--text-p);font-family:var(--font-body);font-size:14px;padding:8px 11px;width:100%;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--chartreuse)}
select option{background:var(--bg-nav)}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--line-s);border-radius:3px}
</style>

    if(task.done)return<div style={{width:14,height:14,borderRadius:3,flexShrink:0,marginTop:2,background:'var(--pine)',border:'1.5px solid var(--pine)',display:'flex',alignItems:'center',justifyContent:'center'}}><svg width="8" height="8" viewBox="0 0 8 8" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round"><path d="M1.5 4l2 2 3-3"/></svg></div>;
    if(task.type==='maintenance')return<div style={{width:14,height:14,borderRadius:'50%',flexShrink:0,marginTop:2,border:`1.5px solid ${ac}`,background:'transparent'}}/>;
    if(task.type==='opportunistic')return<div style={{width:14,height:14,flexShrink:0,marginTop:2,display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{width:9,height:9,border:`1.5px solid ${ac}`,transform:'rotate(45deg)'}}/></div>;
    return<div style={{width:14,height:14,borderRadius:3,flexShrink:0,marginTop:2,border:`1.5px solid ${ac}`,background:'transparent'}}/>;
  };

  return(
    <div style={{height:'100%',display:'flex',overflow:'hidden'}}>
      <div style={{flex:'0 0 55%',borderRight:'1px solid var(--line)',overflowY:'auto',padding:'22px 28px 48px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:22}}>
          <span style={{fontFamily:'var(--font-display)',fontSize:24,fontVariationSettings:'"BNCE" 20',fontWeight:700,color:'var(--text-p)'}}>Tasks</span>
          {openEdit&&<button onClick={()=>openEdit('task',null)} style={{background:'var(--chartreuse)',border:'none',borderRadius:5,padding:'6px 12px',cursor:'pointer',fontFamily:'var(--font-label)',fontSize:9,letterSpacing:'.12em',textTransform:'uppercase',color:'#0C1E0C',fontWeight:600}}>+ New Task</button>}
        </div>
        {UGS.map(g=>{
          const grp=tasks.filter(t=>t.urgency===g.k&&!t.done);
          if(!grp.length)return null;
          return(
            <div key={g.k} style={{marginBottom:26}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,paddingBottom:6,borderBottom:'1px solid var(--line)'}}>
                <div style={{width:7,height:7,borderRadius:'50%',background:g.dot,flexShrink:0}}/>
                <span style={{fontFamily:'var(--font-label)',fontSize:10,letterSpacing:'.18em',textTransform:'uppercase',color:g.ac,fontWeight:600}}>{g.lbl}</span>
              </div>
              {grp.map(task=>(
                <div key={task.id} className="hr" style={{display:'flex',alignItems:'flex-start',gap:10,padding:'7px 6px',borderBottom:'1px solid var(--line)',cursor:'pointer',borderRadius:4}}>

                    </div>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:3,flexShrink:0}}>
                    {task.dl&&!task.done&&<span style={{...SML,color:task.urgency==='blocker'?'var(--clay)':'var(--text-m)'}}>{task.dl}</span>}
                    {!task.rev&&!task.done&&<span style={{...SML,fontSize:8,color:'var(--clay)',opacity:.65}}>irreversible</span>}

                      title="Edit">✎</button>}
                  </div>
                </div>
              ))}
            </div>
          );
        })}
        {tasks.filter(t=>t.done).length>0&&(
          <div>
            <div style={{fontFamily:'var(--font-label)',fontSize:9,letterSpacing:'.16em',textTransform:'uppercase',color:'var(--text-m)',paddingBottom:6,borderBottom:'1px solid var(--line)',marginBottom:8}}>Completed</div>

          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:view==='week'?4:'2px 3px',marginBottom:6}}>
          {DABB2.map(d=><div key={d} style={{fontFamily:'var(--font-label)',fontSize:8,letterSpacing:'.10em',textTransform:'uppercase',color:'var(--text-m)',textAlign:'center',paddingBottom:view==='week'?7:4}}>{d}</div>)}
        </div>
        {view==='week'?(
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4}}>
            {weekDays.map(day=>{const iT=day===14,evts=CAL_EVTS[day]||[];return(
              <div key={day} className="cd" onClick={()=>setSelDay(day)} style={{textAlign:'center',padding:'10px 3px',background:iT?'var(--chartreuse)':day===selDay?'var(--bg-raised)':'transparent',borderRadius:4,outline:day===selDay&&!iT?'1px solid var(--line-s)':'none'}}>
                <div style={{fontSize:15,fontWeight:iT?700:400,color:iT?'#0C1E0C':'var(--text-s)',marginBottom:5}}>{day}</div>
                <div style={{display:'flex',justifyContent:'center',gap:2,flexWrap:'wrap'}}>
                  {evts.slice(0,3).map((e,i)=><div key={i} style={{width:5,height:5,borderRadius:'50%',background:e.c}}/>)}
                </div>
              </div>
            );})}
          </div>
        ):(
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'2px 3px'}}>
            {montCells.map(day=>{const iT=day===14,evts=CAL_EVTS[day]||[];return(
              <div key={day} className="cd" onClick={()=>setSelDay(day)} style={{textAlign:'center',padding:'5px 2px',background:iT?'var(--chartreuse)':day===selDay?'var(--bg-raised)':'transparent',borderRadius:3}}>
                <div style={{fontSize:12,fontWeight:iT?700:400,color:iT?'#0C1E0C':'var(--text-s)'}}>{day}</div>
                {evts.length>0&&<div style={{display:'flex',justifyContent:'center',gap:1,marginTop:1}}>{evts.slice(0,2).map((e,i)=><div key={i} style={{width:3,height:3,borderRadius:'50%',background:e.c}}/>)}</div>}
              </div>
            );})}
          </div>
        )}
        {CAL_EVTS[selDay]&&(
          <div style={{marginTop:20,paddingTop:16,borderTop:'1px solid var(--line)'}}>
            <div style={{fontFamily:'var(--font-label)',fontSize:10,letterSpacing:'.16em',textTransform:'uppercase',color:'var(--pine)',marginBottom:10}}>June {selDay}</div>
            {CAL_EVTS[selDay].map((e,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:9,padding:'6px 0',borderBottom:'1px solid var(--line)'}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:e.c,flexShrink:0}}/><span style={{fontSize:13,color:'var(--text-s)'}}>{e.l}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}
Object.assign(window,{TasksPage});

</script>

<script type="text/babel">

const STATUS_CFG = {
  seedling:    {bg:'var(--pale-herb)',  color:'#0C1E0C', label:'Seedling'},
  growing:     {bg:'var(--chartreuse)',color:'#0C1E0C', label:'Growing'},
  fruiting:    {bg:'var(--buttercup)', color:'#2C1E00', label:'Fruiting'},

  removed:     {bg:'var(--bg-raised)', color:'var(--text-m)', label:'Removed'},
};
const SML={fontFamily:'var(--font-label)',fontSize:9,letterSpacing:'.12em',textTransform:'uppercase'};

/* ── Plants Overview ── */
function PlantsOverviewPage({setPage, plants, openEdit}) {
  const [filter, setFilter] = React.useState('all');

  const filtered = plants.filter(p => {
    const sf = filter === 'all' || p.status === filter;

    return sf && lf;
  });

  return (
    <div style={{height:'100%', display:'flex', flexDirection:'column', overflow:'hidden'}}>
      <div style={{padding:'20px 28px 14px', borderBottom:'1px solid var(--line)', flexShrink:0}}>

            <div style={{fontFamily:'var(--font-label)', fontSize:9, letterSpacing:'.16em', textTransform:'uppercase', color:'var(--pine)', marginTop:5}}>{plants.length} plants · Zone 9b</div>
          </div>
          {openEdit && <button onClick={()=>openEdit('plant',null)} style={{background:'var(--chartreuse)', border:'none', borderRadius:5, padding:'7px 14px', cursor:'pointer', fontFamily:'var(--font-label)', fontSize:9, letterSpacing:'.12em', textTransform:'uppercase', color:'#0C1E0C', fontWeight:600}}>+ Add Plant</button>}

                style={{background:'var(--bg-nav)', border:'1px solid var(--line)', borderRadius:10, overflow:'hidden', cursor:'pointer', transition:'border-color .15s, transform .1s'}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--line-s)';e.currentTarget.style.transform='translateY(-1px)'}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--line)';e.currentTarget.style.transform='none'}}>
                {/* Specimen area */}
                <div style={{height:76, background:'repeating-linear-gradient(45deg, var(--gc), var(--gc) 1px, transparent 1px, transparent 10px)', borderBottom:'1px solid var(--line)', display:'flex', alignItems:'center', justifyContent:'center', position:'relative'}}>
                  <div style={{fontFamily:'var(--font-botanical)', fontSize:13, color:'var(--text-m)', opacity:.55, textAlign:'center', padding:'0 12px', lineHeight:1.3}}>{plant.species}</div>
                  {plant.projectId && (
                    <div style={{position:'absolute', top:8, right:8, width:7, height:7, borderRadius:'50%', background:'var(--pine)', opacity:.8}} title="Part of active project"/>
                  )}
                </div>
                <div style={{padding:'12px 14px'}}>
                  <div style={{fontFamily:'var(--font-label)', fontSize:9, letterSpacing:'.18em', textTransform:'uppercase', color:'var(--pine)', marginBottom:5, lineHeight:1.4}}>{plant.family} · {plant.category}</div>
                  <div style={{fontFamily:'var(--font-display)', fontSize:17, fontVariationSettings:'"BNCE" 20', fontWeight:700, color:'var(--text-p)', lineHeight:1.1, marginBottom:4}}>{plant.name}</div>
                  <div style={{fontFamily:'var(--font-botanical)', fontSize:14, color:'var(--pine)', lineHeight:1, marginBottom:10}}>{plant.variety || plant.species}</div>
                  <div style={{display:'flex', gap:5, marginBottom:8, flexWrap:'wrap'}}>
                    <span className="chip" style={{background:STATUS_CFG[plant.status]?.bg, color:STATUS_CFG[plant.status]?.color, fontSize:8}}>
                      {STATUS_CFG[plant.status]?.label || plant.status}
                    </span>
                    <span className="chip" style={{background:'transparent', border:'1px solid var(--line)', color:'var(--text-t)', fontSize:8}}>
                      {plant.sun}
                    </span>
                  </div>
                  <div style={{...SML, fontSize:9, color:'var(--text-m)'}}>{plant.location}</div>
                </div>
              </article>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Plant Detail ── */
function PlantDetailPage({plantId, setPage, plants, openEdit}) {
  const plant = plants.find(p => p.id === plantId) || plants[0];
  if (!plant) return <div style={{padding:40, color:'var(--text-m)'}}>Plant not found.</div>;

  const cfg = STATUS_CFG[plant.status] || STATUS_CFG.growing;

  return (
    <div style={{height:'100%', overflowY:'auto'}}>
      <div style={{padding:'20px 28px 48px'}}>
        {/* Back + actions */}
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:22}}>
          <button onClick={()=>setPage('plants')} style={{background:'none', border:'none', cursor:'pointer', ...SML, color:'var(--text-m)', display:'flex', alignItems:'center', gap:6, padding:0}}>
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M8 2L4 6l4 4"/></svg>
            Plants
          </button>
          {openEdit && <button onClick={()=>openEdit('plant',plant)} style={{background:'none', border:'1px solid var(--line-s)', borderRadius:5, padding:'6px 13px', cursor:'pointer', ...SML, color:'var(--text-m)'}}>Edit Plant</button>}
        </div>

        {/* Header */}
        <div style={{marginBottom:18}}>
          <div style={{fontFamily:'var(--font-label)', fontSize:10, letterSpacing:'.22em', textTransform:'uppercase', color:'var(--pine)', marginBottom:8}}>{plant.family} · {plant.category}</div>
          <div style={{fontFamily:'var(--font-display)', fontSize:52, fontVariationSettings:'"BNCE" 20', fontWeight:700, lineHeight:.96, color:'var(--text-p)', marginBottom:8}}>{plant.name}</div>
          <div style={{fontFamily:'var(--font-botanical)', fontSize:30, color:'var(--pine)', lineHeight:1.1, marginBottom:10}}>{plant.species}</div>
          <div style={{display:'flex', gap:8, alignItems:'center'}}>
            <div style={{fontFamily:'var(--font-label)', fontSize:9, letterSpacing:'.15em', textTransform:'uppercase', color:'var(--text-m)'}}>{plant.variety && `Variety: ${plant.variety}`}</div>
            <span className="chip" style={{background:cfg.bg, color:cfg.color, fontSize:9}}>{cfg.label}</span>
          </div>
        </div>

        <div style={{borderTop:'2px solid var(--line-s)', marginBottom:20}}/>

        {/* Quick facts grid */}
        <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'0 28px', marginBottom:18}}>
          {plant.facts.map(([l,v]) => (
            <div key={l} style={{padding:'7px 0', borderBottom:'1px solid var(--line)'}}>
              <div style={{fontFamily:'var(--font-label)', fontSize:8, letterSpacing:'.14em', textTransform:'uppercase', color:'var(--pine)', marginBottom:2}}>{l}</div>
              <div style={{fontSize:14, fontWeight:700, color:'var(--text-s)'}}>{v}</div>
            </div>
          ))}
        </div>

        {/* Chips */}
        <div style={{display:'flex', flexWrap:'wrap', gap:6, marginBottom:24}}>
          {plant.chips.map(c => <span key={c} className="chip" style={{background:'var(--pale-herb)', color:'#0C1E0C'}}>{c}</span>)}
        </div>

        <div style={{borderTop:'1px solid var(--line)', marginBottom:22}}/>

        {/* Care Notes */}
        <div style={{marginBottom:22}}>
          <div style={{fontFamily:'var(--font-label)', fontSize:10, fontWeight:500, letterSpacing:'.18em', textTransform:'uppercase', color:'var(--pine)', marginBottom:14}}>Care Notes</div>
          <p style={{fontSize:14, color:'var(--text-s)', lineHeight:1.78}}>{plant.careNotes}</p>
        </div>

        <div style={{borderTop:'1px solid var(--line)', marginBottom:22}}/>

        {/* History */}
        <div style={{marginBottom:22}}>
          <div style={{fontFamily:'var(--font-label)', fontSize:10, fontWeight:500, letterSpacing:'.18em', textTransform:'uppercase', color:'var(--pine)', marginBottom:14}}>History & Observations</div>
          <p style={{fontSize:14, color:'var(--text-s)', lineHeight:1.78}}>{plant.history}</p>
          {plant.sowDate && (
            <div style={{fontFamily:'var(--font-botanical)', fontSize:18, color:'var(--pine)', lineHeight:1.2, marginTop:10}}>
              {[plant.sowDate&&`Sown ${plant.sowDate}`, plant.redCupDate&&`Red cup ${plant.redCupDate}`, plant.transplantDate&&`Final ${plant.transplantDate}`].filter(Boolean).join(' → ')}
            </div>
          )}
        </div>

        {/* Rhizome suggestions */}
        {plant.suggestions.length > 0 && <>
          <div style={{borderTop:'1px solid var(--line)', marginBottom:22}}/>
          <div style={{marginBottom:22}}>
            <div style={{fontFamily:'var(--font-label)', fontSize:10, fontWeight:500, letterSpacing:'.18em', textTransform:'uppercase', color:'var(--pine)', marginBottom:14}}>Rhizome Suggests</div>
            <div style={{display:'flex', flexDirection:'column', gap:8}}>
              {plant.suggestions.map((s,i) => (
                <div key={i} style={{padding:'11px 14px', borderLeft:`3px solid ${s.urgency==='urgent'?'var(--clay)':'var(--chartreuse)'}`, background:'var(--bg-raised)', borderRadius:'0 7px 7px 0'}}>
                  <div style={{fontFamily:'var(--font-label)', fontSize:8, letterSpacing:'.12em', textTransform:'uppercase', color:s.urgency==='urgent'?'var(--clay)':'var(--pine)', marginBottom:5}}>{s.urgency==='urgent'?'Action needed':'Note'}</div>
                  <p style={{fontSize:13, color:'var(--text-s)', lineHeight:1.6}}>{s.text}</p>
                </div>
              ))}
            </div>
          </div>
        </>}
      </div>
    </div>
  );
}

Object.assign(window, {PlantsOverviewPage, PlantDetailPage});

</script>
<script type="text/babel">

const PROJ_CFG = {
  active:      {dot:'●', color:'var(--pine)',      border:'#2B5C2F', label:'Active'},
  planning:    {dot:'◎', color:'var(--buttercup)', border:'#FFC94D', label:'Planning'},
  maintaining: {dot:'○', color:'var(--pale-herb)', border:'#B0EAAC', label:'Maintaining'},
  paused:      {dot:'◌', color:'var(--text-m)',    border:'rgba(242,232,201,.2)', label:'Paused'},
  complete:    {dot:'✓', color:'var(--chartreuse)',border:'#B8D43A', label:'Complete'},
};
const PSML={fontFamily:'var(--font-label)',fontSize:9,letterSpacing:'.12em',textTransform:'uppercase'};

/* ── Projects List ── */
function ProjectsPage({setPage, projects, plants, openEdit}) {
  const [filter, setFilter] = React.useState('all');
  const statuses = ['all','planning','active','maintaining','paused','complete'];
  const filtered = filter==='all' ? projects : projects.filter(p=>p.status===filter);

  return (
    <div style={{height:'100%', display:'flex', flexDirection:'column', overflow:'hidden'}}>
      <div style={{padding:'20px 28px 14px', borderBottom:'1px solid var(--line)', flexShrink:0}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:16}}>
          <div>
            <div style={{fontFamily:'var(--font-display)', fontSize:22, fontVariationSettings:'"BNCE" 20', fontWeight:700, color:'var(--text-p)', lineHeight:1}}>Projects</div>
            <div style={{fontFamily:'var(--font-label)', fontSize:9, letterSpacing:'.16em', textTransform:'uppercase', color:'var(--pine)', marginTop:5}}>{projects.filter(p=>p.status==='active').length} active · {projects.length} total</div>
          </div>
          {openEdit && <button onClick={()=>openEdit('project',null)} style={{background:'var(--chartreuse)', border:'none', borderRadius:5, padding:'7px 14px', cursor:'pointer', fontFamily:'var(--font-label)', fontSize:9, letterSpacing:'.12em', textTransform:'uppercase', color:'#0C1E0C', fontWeight:600}}>+ New Project</button>}
        </div>
        <div style={{display:'flex', gap:4}}>
          {statuses.map(s => (
            <button key={s} onClick={()=>setFilter(s)} style={{background:filter===s?'var(--pine)':'transparent', border:`1px solid ${filter===s?'var(--pine)':'var(--line-s)'}`, borderRadius:4, padding:'4px 10px', cursor:'pointer', ...PSML, color:filter===s?'rgba(255,255,255,.9)':'var(--text-m)', transition:'all .15s', textTransform:'capitalize'}}>
              {s==='all'?'All':s}
            </button>
          ))}
        </div>
      </div>
      <div style={{flex:1, overflowY:'auto'}}>
        {filtered.map(proj => {
          const cfg = PROJ_CFG[proj.status] || PROJ_CFG.active;
          const budgetPct = proj.budget > 0 ? Math.round(proj.budgetSpent/proj.budget*100) : 0;
          const projPlants = plants.filter(p=>p.projectId===proj.id);
          return (
            <div key={proj.id} className="hr" onClick={()=>setPage('project',{projectId:proj.id})}
              style={{borderLeft:`3px solid ${cfg.border}`, paddingLeft:22, paddingRight:28, paddingTop:18, paddingBottom:18, borderBottom:'1px solid var(--line)', cursor:'pointer', display:'grid', gridTemplateColumns:'1fr auto', gap:20, alignItems:'start'}}>
              <div>
                <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:7}}>
                  <span style={{color:cfg.color, fontSize:13}}>{cfg.dot}</span>
                  <span style={{...PSML, color:cfg.color, fontWeight:600}}>{cfg.label}</span>
                  {proj.startDate && <span style={{...PSML, fontSize:8, color:'var(--text-m)'}}>Since {proj.startDate.split(',')[0]}</span>}
                </div>
                <div style={{fontFamily:'var(--font-display)', fontSize:20, fontVariationSettings:'"BNCE" 20', fontWeight:700, color:'var(--text-p)', lineHeight:1.1, marginBottom:6}}>{proj.name}</div>
                <div style={{fontSize:13, color:'var(--text-t)', lineHeight:1.55, marginBottom:10, maxWidth:560}}>{proj.goal.length > 110 ? proj.goal.slice(0,110)+'…' : proj.goal}</div>
                <div style={{display:'flex', gap:6, flexWrap:'wrap', alignItems:'center'}}>
                  {proj.beds.map(b => <span key={b} className="chip" style={{background:'var(--bg-raised)', color:'var(--text-s)', border:'1px solid var(--line)', fontSize:8}}>📍 {b}</span>)}
                  {proj.containers.map(c => <span key={c} className="chip" style={{background:'var(--bg-raised)', color:'var(--text-t)', border:'1px solid var(--line)', fontSize:8}}>○ {c}</span>)}
                  {proj.traySlots > 0 && <span className="chip" style={{background:'var(--bg-raised)', color:'var(--text-t)', border:'1px solid var(--line)', fontSize:8}}>⊞ {proj.traySlots} trays</span>}
                  {projPlants.length > 0 && <span style={{...PSML, fontSize:8, color:'var(--text-m)'}}>{projPlants.length} plant{projPlants.length!==1?'s':''}</span>}
                </div>
              </div>
              <div style={{display:'flex', flexDirection:'column', alignItems:'flex-end', gap:10, minWidth:110, flexShrink:0}}>
                <div style={{...PSML, fontSize:8, color:'var(--text-m)'}}>{proj.completedTasks}/{proj.taskCount} tasks</div>
                {proj.budget > 0 && (
                  <div style={{textAlign:'right'}}>
                    <div style={{...PSML, fontSize:8, color:'var(--text-m)', marginBottom:4}}>${proj.budgetSpent} / ${proj.budget}</div>
                    <div style={{width:90, height:3, background:'var(--line)', borderRadius:999}}>
                      <div style={{width:`${budgetPct}%`, height:'100%', background:cfg.color, borderRadius:999, transition:'width .3s'}}/>
                    </div>
                  </div>
                )}
                <span style={{fontSize:14, color:'var(--text-m)'}}>→</span>
              </div>
            </div>
          );
        })}
        {filtered.length === 0 && <div style={{padding:'48px 0', textAlign:'center', ...PSML, color:'var(--text-m)', fontSize:10}}>No projects match filter</div>}
      </div>
    </div>
  );
}

/* ── Project Detail ── */
function ProjectDetailPage({projectId, setPage, projects, plants, openEdit}) {
  const [tab, setTab] = React.useState('overview');
  const [projTasks, setProjTasks] = React.useState(null);

  const project = projects.find(p => p.id === projectId);
  if (!project) return <div style={{padding:40, color:'var(--text-m)'}}>Project not found.</div>;

  React.useEffect(() => { setProjTasks(project.tasks.map(t=>({...t}))); }, [projectId]);

  const cfg = PROJ_CFG[project.status] || PROJ_CFG.active;
  const projPlants = plants.filter(p => p.projectId === projectId);
  const budgetPct = project.budget > 0 ? Math.round(project.budgetSpent/project.budget*100) : 0;
  const tasks = projTasks || project.tasks;
  const toggleTask = id => setProjTasks(ts => ts.map(t=>t.id===id?{...t,done:!t.done}:t));

  const TABS = ['overview','plants','schedule','tasks','activity'];

  return (
    <div style={{height:'100%', display:'flex', flexDirection:'column', overflow:'hidden'}}>
      {/* Header */}
      <div style={{padding:'16px 28px 12px', borderBottom:'1px solid var(--line)', flexShrink:0, borderLeft:`3px solid ${cfg.border}`}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
          <div style={{flex:1}}>
            <button onClick={()=>setPage('projects')} style={{background:'none', border:'none', cursor:'pointer', ...PSML, color:'var(--text-m)', display:'flex', alignItems:'center', gap:5, padding:0, marginBottom:10}}>
              <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M8 2L4 6l4 4"/></svg>
              Projects
            </button>
            <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:6}}>
              <span style={{color:cfg.color, fontSize:13}}>{cfg.dot}</span>
              <span style={{...PSML, color:cfg.color, fontWeight:600}}>{cfg.label}</span>
            </div>
            <div style={{fontFamily:'var(--font-display)', fontSize:26, fontVariationSettings:'"BNCE" 20', fontWeight:700, color:'var(--text-p)', lineHeight:1.05, marginBottom:8}}>{project.name}</div>
            <div style={{fontSize:13, color:'var(--text-t)', lineHeight:1.6, maxWidth:600, marginBottom:12, fontStyle:'italic'}}>"{project.goal}"</div>
            <div style={{display:'flex', gap:6, flexWrap:'wrap'}}>
              {project.beds.map(b => <span key={b} className="chip" style={{background:'var(--bg-raised)', color:'var(--text-s)', border:'1px solid var(--line)', fontSize:8}}>📍 {b}</span>)}
              {project.containers.map(c => <span key={c} className="chip" style={{background:'var(--bg-raised)', color:'var(--text-t)', border:'1px solid var(--line)', fontSize:8}}>○ {c}</span>)}
              {project.traySlots > 0 && <span className="chip" style={{background:'var(--bg-raised)', color:'var(--text-t)', border:'1px solid var(--line)', fontSize:8}}>⊞ {project.traySlots} of 8 trays</span>}
            </div>
          </div>
          {openEdit && <button onClick={()=>openEdit('project',project)} style={{background:'none', border:'1px solid var(--line-s)', borderRadius:5, padding:'6px 12px', cursor:'pointer', ...PSML, color:'var(--text-m)', flexShrink:0}}>Edit</button>}
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:'flex', borderBottom:'1px solid var(--line)', flexShrink:0, padding:'8px 28px 0'}}>
        {TABS.map(t => (
          <button key={t} onClick={()=>setTab(t)} style={{background:'none', border:'none', cursor:'pointer', fontFamily:'var(--font-label)', fontSize:10, letterSpacing:'.14em', textTransform:'capitalize', color:tab===t?'var(--pine)':'var(--text-m)', fontWeight:tab===t?600:400, padding:'9px 14px 8px', borderBottom:tab===t?'2px solid var(--pine)':'2px solid transparent', transition:'all .15s', marginBottom:-1}}>
            {t}{t==='plants'&&projPlants.length>0?` (${projPlants.length})`:''}{t==='tasks'&&tasks.length>0?` (${tasks.length})`:''}
          </button>
        ))}
      </div>

      {/* Tab content */}
      <div style={{flex:1, overflowY:'auto', padding:'24px 28px 48px'}}>

        {/* OVERVIEW */}
        {tab==='overview' && (
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:32, maxWidth:700}}>
            <div>
              <div style={{...PSML, color:'var(--pine)', marginBottom:14, fontSize:10, fontWeight:500}}>Timeline</div>
              {[['Started', project.startDate||'Not set'], ['Target', project.targetDate||'Not set']].map(([l,v])=>(
                <div key={l} style={{display:'flex', justifyContent:'space-between', padding:'7px 0', borderBottom:'1px solid var(--line)'}}>
                  <span style={{...PSML, fontSize:9, color:'var(--text-m)'}}>{l}</span>
                  <span style={{fontSize:13, color:'var(--text-s)', fontWeight:500}}>{v}</span>
                </div>
              ))}
              <div style={{display:'flex', justifyContent:'space-between', padding:'7px 0', borderBottom:'1px solid var(--line)'}}>
                <span style={{...PSML, fontSize:9, color:'var(--text-m)'}}>Progress</span>
                <span style={{fontSize:13, color:'var(--text-s)', fontWeight:500}}>{project.completedTasks}/{project.taskCount} tasks</span>
              </div>
              <div style={{display:'flex', justifyContent:'space-between', padding:'7px 0', borderBottom:'1px solid var(--line)'}}>
                <span style={{...PSML, fontSize:9, color:'var(--text-m)'}}>Plants</span>
                <span style={{fontSize:13, color:'var(--text-s)', fontWeight:500}}>{projPlants.length} assigned</span>
              </div>
            </div>
            {project.budget > 0 && (
              <div>
                <div style={{...PSML, color:'var(--pine)', marginBottom:14, fontSize:10, fontWeight:500}}>Budget</div>
                <div style={{display:'flex', justifyContent:'space-between', marginBottom:8}}>
                  <span style={{fontSize:22, fontWeight:700, color:'var(--text-p)'}}>${project.budgetSpent}</span>
                  <span style={{fontSize:13, color:'var(--text-m)', alignSelf:'flex-end', marginBottom:3}}>of ${project.budget}</span>
                </div>
                <div style={{height:6, background:'var(--line)', borderRadius:999, marginBottom:6}}>
                  <div style={{width:`${budgetPct}%`, height:'100%', background:cfg.color, borderRadius:999}}/>
                </div>
                <div style={{...PSML, fontSize:8, color:'var(--text-m)'}}>{100-budgetPct}% remaining · ${project.budget - project.budgetSpent} left</div>
              </div>
            )}
          </div>
        )}

        {/* PLANTS */}
        {tab==='plants' && (
          <div>
            {projPlants.length === 0 ? (
              <div style={{padding:'32px 0', color:'var(--text-m)', fontSize:13}}>No plants assigned to this project yet.{' '}
                <button onClick={()=>openEdit&&openEdit('plant',null)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--pine)',fontSize:13,fontFamily:'var(--font-body)'}}>Add a plant →</button>
              </div>
            ) : (
              <>
                <div style={{display:'grid', gridTemplateColumns:'2fr 2fr 1.2fr 1.2fr', gap:'0 16px', paddingBottom:7, borderBottom:'1px solid var(--line)', marginBottom:2}}>
                  {['Name','Species','Status','Location'].map(h=><div key={h} style={{...PSML, fontSize:9, color:'var(--text-m)'}}>{h}</div>)}
                </div>
                {projPlants.map(p=>(
                  <div key={p.id} className="hr cd" onClick={()=>setPage('plant',{plantId:p.id})} style={{display:'grid', gridTemplateColumns:'2fr 2fr 1.2fr 1.2fr', gap:'0 16px', padding:'10px 0', borderBottom:'1px solid var(--line)', alignItems:'center'}}>
                    <span style={{fontSize:14, fontWeight:600, color:'var(--text-p)'}}>{p.name}</span>
                    <span style={{fontFamily:'var(--font-botanical)', fontSize:14, color:'var(--pine)'}}>{p.species}</span>
                    <span className="chip" style={{background:({seedling:'var(--pale-herb)',growing:'var(--chartreuse)',fruiting:'var(--buttercup)',established:'var(--bg-raised)'})[p.status]||'var(--bg-raised)', color:({seedling:'#0C1E0C',growing:'#0C1E0C',fruiting:'#2C1E00',established:'var(--text-s)'})[p.status]||'var(--text-s)', fontSize:8, alignSelf:'center', justifySelf:'start'}}>{p.status}</span>
                    <span style={{fontSize:12, color:'var(--text-t)'}}>{p.location}</span>
                  </div>
                ))}
              </>
            )}
          </div>
        )}

        {/* SCHEDULE */}
        {tab==='schedule' && (
          <div>
            {project.seedSchedule.length === 0 ? (
              <div style={{padding:'32px 0', color:'var(--text-m)', fontSize:13}}>No seed schedule yet — approve a plan to generate one.</div>
            ) : (
              <>
                <div style={{marginBottom:24}}>
                  <div style={{...PSML, color:'var(--text-m)', fontSize:9, marginBottom:12}}>Apr 2026 → Oct 2026</div>
                  {/* Month header */}
                  <div style={{display:'flex', marginBottom:4, paddingLeft:130}}>
                    {['Apr','May','Jun','Jul','Aug','Sep','Oct'].map(m=><div key={m} style={{flex:1, ...PSML, fontSize:8, color:'var(--text-m)', textAlign:'center'}}>{m}</div>)}
                  </div>
                  <div style={{paddingLeft:130, marginBottom:6, position:'relative'}}>
                    {[0,1,2,3,4,5,6].map(i=><div key={i} style={{position:'absolute', left:`calc(130px + ${i/7*100}%)`, top:-8, bottom:0, width:1, background:'var(--line)', opacity:.5}}/>)}
                  </div>
                  {project.seedSchedule.map(row => (
                    <div key={row.plant} style={{display:'flex', alignItems:'center', marginBottom:18, gap:0}}>
                      <div style={{width:130, flexShrink:0, fontSize:13, color:'var(--text-s)', paddingRight:16}}>
                        <div style={{fontWeight:600}}>{row.plant}</div>

                      <span style={{...PSML, fontSize:8, color:urgencyColor}}>{task.urgency.replace('_','-')}</span>
                      {task.dl && <span style={{...PSML, fontSize:8, color:'var(--text-m)'}}>{task.dl}</span>}
                    </div>

        {tab==='activity' && (

        )}

      </div>
    </div>
  );
}

<script type="text/babel">

              {Array.from({length:daysInMonth},(_,i)=>i+1).map(day=>{
                const evts = getEvents(day);

                return (
                  <div key={day} onClick={()=>setSelDay(day)} className="cd"
                    style={{borderRadius:5, padding:'6px 7px', minHeight:72, background:isToday?'rgba(184,212,58,0.1)':isSel?'var(--bg-raised)':'transparent', border:`1px solid ${isToday?'rgba(184,212,58,0.35)':isSel?'var(--line-s)':'var(--line)'}`, cursor:'pointer', display:'flex', flexDirection:'column', gap:3}}>

                return (
                  <div key={day} onClick={()=>setSelDay(day)} className="cd"

                    {isToday && <div style={{width:'100%', height:1, background:'var(--chartreuse)', opacity:.25, marginBottom:8}}/>}

        {/* Day detail panel */}

              return (

<script type="text/babel">

const ESML={fontFamily:'var(--font-label)',fontSize:9,letterSpacing:'.14em',textTransform:'uppercase'};

function FieldLabel({children}) {

}

function EditModal({type, entity, onSave, onClose, projects}) {
  const isNew = !entity || !entity.id;
  const [form, setForm] = React.useState(() => {
    if (type === 'plant') return {
      name: entity?.name||'', species: entity?.species||'', variety: entity?.variety||'',
      family: entity?.family||'', category: entity?.category||'',
      location: entity?.location||'', status: entity?.status||'growing',
      projectId: entity?.projectId||'', sun: entity?.sun||'Full sun',
      water: entity?.water||'', zone: entity?.zone||'9b — excellent',
      careNotes: entity?.careNotes||'', history: entity?.history||'',
    };
    if (type === 'project') return {
      name: entity?.name||'', status: entity?.status||'planning',
      goal: entity?.goal||'', budget: entity?.budget||0,
      budgetSpent: entity?.budgetSpent||0,
      startDate: entity?.startDate||'', targetDate: entity?.targetDate||'',
      traySlots: entity?.traySlots||0,
    };
    if (type === 'task') return {
      text: entity?.text||'', urgency: entity?.urgency||'scheduled',
      type: entity?.type||'maintenance', dl: entity?.dl||'',
      mins: entity?.mins||30, rev: entity?.rev!==undefined?entity.rev:true,
    };
    return {};
  });
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const [saved, setSaved] = React.useState(false);

  const handleSave = () => {
    const out = type==='plant'
      ? {...(entity||{}), ...form, id: entity?.id, chips: entity?.chips||[], facts: entity?.facts||[], suggestions: entity?.suggestions||[]}

      ? {...(entity||{}), ...form, id: entity?.id, tasks: entity?.tasks||[], seedSchedule: entity?.seedSchedule||[], iterations: entity?.iterations||[], taskCount: entity?.taskCount||0, completedTasks: entity?.completedTasks||0, beds: entity?.beds||[], containers: entity?.containers||[]}
      : {...(entity||{}), ...form, id: entity?.id};

    setTimeout(()=>onSave(type, out), 400);

            </select>
            <FieldLabel>Goal</FieldLabel>
            <textarea value={form.goal} onChange={e=>set('goal',e.target.value)} rows={4} style={{background:'var(--input-bg)',border:'1px solid var(--line)',borderRadius:6,padding:'8px 11px',width:'100%',resize:'vertical',color:'var(--text-p)',fontFamily:'var(--font-body)',fontSize:13,lineHeight:1.6}} placeholder="Describe what you want to achieve…"/>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
              <div>
                <FieldLabel>Budget ($)</FieldLabel>
                <input type="number" value={form.budget} onChange={e=>set('budget',Number(e.target.value))} placeholder="150"/>
              </div>
              <div>
                <FieldLabel>Tray Slots</FieldLabel>
                <input type="number" value={form.traySlots} onChange={e=>set('traySlots',Number(e.target.value))} placeholder="0" min="0" max="8"/>
              </div>
            </div>
            <FieldLabel>Start Date</FieldLabel>
            <input value={form.startDate} onChange={e=>set('startDate',e.target.value)} placeholder="e.g. Mar 15, 2026"/>
            <FieldLabel>Target Date</FieldLabel>
            <input value={form.targetDate} onChange={e=>set('targetDate',e.target.value)} placeholder="e.g. Oct 31, 2026"/>
          </>}

          {type==='task' && <>
            <FieldLabel>Description</FieldLabel>
            <input value={form.text} onChange={e=>set('text',e.target.value)} placeholder="What needs to be done?"/>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
              <div>
                <FieldLabel>Type</FieldLabel>
                <select value={form.type} onChange={e=>set('type',e.target.value)}>
                  {['emergency','milestone','maintenance','opportunistic'].map(s=><option key={s} value={s}>{s}</option>)}
                </select>
              </div>
              <div>
                <FieldLabel>Urgency</FieldLabel>
                <select value={form.urgency} onChange={e=>set('urgency',e.target.value)}>
                  {['blocker','time_sensitive','scheduled','backlog'].map(s=><option key={s} value={s}>{s.replace('_',' ')}</option>)}
                </select>
              </div>
            </div>
            <FieldLabel>Deadline</FieldLabel>
            <input value={form.dl||''} onChange={e=>set('dl',e.target.value)} placeholder="e.g. Jun 20 or Today"/>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
              <div>
                <FieldLabel>Est. Minutes</FieldLabel>
                <input type="number" value={form.mins} onChange={e=>set('mins',Number(e.target.value))} placeholder="30"/>
              </div>
              <div style={{paddingTop:16+6}}>
                <label style={{display:'flex', alignItems:'center', gap:8, cursor:'pointer', fontSize:13, color:'var(--text-s)'}}>
                  <input type="checkbox" checked={form.rev} onChange={e=>set('rev',e.target.checked)} style={{width:'auto', accentColor:'var(--chartreuse)'}}/>
                  Reversible
                </label>
              </div>
            </div>
          </>}

          {type==='garden' && (
            <div style={{padding:'20px 0', color:'var(--text-m)', fontSize:13, lineHeight:1.7}}>
              Garden profile editing — beds, containers, constraints, and preferences — will be handled through conversation with Rhizome in a future version.
              <br/><br/>
              <button onClick={()=>window.__vpSetPage&&window.__vpSetPage('rhizome')} style={{background:'none',border:'none',cursor:'pointer',color:'var(--pine)',fontFamily:'var(--font-label)',fontSize:9,letterSpacing:'.14em',textTransform:'uppercase',padding:0}}>Open Rhizome to discuss →</button>
            </div>
          )}
        </div>

        {/* Footer */}
        {type !== 'garden' && (
          <div style={{padding:'14px 20px', borderTop:'1px solid var(--line)', flexShrink:0, display:'flex', gap:8, justifyContent:'flex-end'}}>
            <button onClick={onClose} style={{background:'transparent', border:'1px solid var(--line-s)', borderRadius:5, padding:'8px 16px', cursor:'pointer', ...ESML, color:'var(--text-m)'}}>Cancel</button>
            <button onClick={handleSave} style={{background:saved?'var(--pine)':'var(--chartreuse)', border:'none', borderRadius:5, padding:'8px 18px', cursor:'pointer', ...ESML, color:saved?'rgba(255,255,255,.9)':'#0C1E0C', fontWeight:600, transition:'background .3s', minWidth:80}}>
              {saved ? '✓ Saved' : isNew ? 'Create' : 'Save'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}
Object.assign(window, {EditModal});

</script>
<script type="text/babel">

const PAGE_LABELS = {
  today:'Today', rhizome:'Rhizome', tasks:'Tasks', calendar:'Calendar',
  garden:'Garden', plants:'Plants', projects:'Projects',
};

function App() {
  const [page, setPage] = React.useState('today');
  const [selectedPlantId, setSelectedPlantId] = React.useState(null);
  const [selectedProjectId, setSelectedProjectId] = React.useState(null);
  const [theme, setTheme] = React.useState('dark');
  const [collapsed, setCollapsed] = React.useState(false);
  const [sweepKey, setSweepKey] = React.useState(0);
  const [sweeping, setSweeping] = React.useState(false);
  const [editState, setEditState] = React.useState({open:false, type:null, entity:null});
  const [plants, setPlants] = React.useState(VP_PLANTS.map(p=>({...p})));
  const [projects, setProjects] = React.useState(VP_PROJECTS.map(p=>({...p})));

  // Store navigate on window so EditModal can access it
  window.__vpSetPage = (p) => navigate(p);

  const navigate = React.useCallback((pageId, params={}) => {
    setSweeping(true); setSweepKey(k=>k+1);
    setPage(pageId);
    if (params.plantId !== undefined) setSelectedPlantId(params.plantId);
    if (params.projectId !== undefined) setSelectedProjectId(params.projectId);
    setTimeout(()=>setSweeping(false), 520);
  }, []);

  const openEdit = (type, entity) => setEditState({open:true, type, entity});
  const closeEdit = () => setEditState({open:false, type:null, entity:null});

  const handleSave = (type, updated) => {
    if (type==='plant') {
      if (updated.id) setPlants(prev=>prev.map(p=>p.id===updated.id?updated:p));
      else setPlants(prev=>[...prev, {...updated, id:'plant-'+Date.now()}]);
    } else if (type==='project') {
      if (updated.id) setProjects(prev=>prev.map(p=>p.id===updated.id?updated:p));
      else setProjects(prev=>[...prev, {...updated, id:'proj-'+Date.now()}]);
    }
    closeEdit();
  };

  React.useEffect(()=>{ document.documentElement.setAttribute('data-theme', theme); }, [theme]);

  // Breadcrumb
  const crumbs = (() => {
    if (page==='plant') return [{label:'Plants', target:'plants'}, {label: plants.find(p=>p.id===selectedPlantId)?.name||'Plant'}];
    if (page==='project') return [{label:'Projects', target:'projects'}, {label: projects.find(p=>p.id===selectedProjectId)?.name||'Project'}];
    return [{label: PAGE_LABELS[page]||page}];
  })();

  const sharedProps = {setPage:navigate, theme, openEdit, plants, projects};

  const renderPage = () => {
    switch(page) {
      case 'today':    return <TodayPage {...sharedProps}/>;
      case 'rhizome':  return <RhizomePage {...sharedProps}/>;
      case 'tasks':    return <TasksPage {...sharedProps}/>;
      case 'calendar': return <CalendarPage {...sharedProps}/>;
      case 'garden':   return <GardenPage {...sharedProps}/>;
      case 'plants':   return <PlantsOverviewPage {...sharedProps}/>;
      case 'plant':    return <PlantDetailPage {...sharedProps} plantId={selectedPlantId}/>;
      case 'projects': return <ProjectsPage {...sharedProps}/>;
      case 'project':  return <ProjectDetailPage {...sharedProps} projectId={selectedProjectId}/>;
      default:         return <TodayPage {...sharedProps}/>;
    }
  };

  return (
    <>
      {sweeping && <div key={sweepKey} className="vs"/>}
      <VPNav page={page} setPage={navigate} theme={theme} setTheme={setTheme} collapsed={collapsed} setCollapsed={setCollapsed}/>
      <div className="cw">
        {/* Breadcrumb */}
        <div className="bc">
          <span>Verdant Pages</span>
          {crumbs.map((c,i) => (
            <React.Fragment key={i}>
              <span style={{color:'var(--line-s)'}}>›</span>
              {c.target
                ? <span className="bc-link" onClick={()=>navigate(c.target)}>{c.label}</span>
                : <span style={{color:'var(--text-s)'}}>{c.label}</span>}
            </React.Fragment>
          ))}
        </div>
        <div className="cm">
          <div className="pi" key={page+selectedPlantId+selectedProjectId}>
            {renderPage()}
          </div>
        </div>
      </div>
      {editState.open && (
        <EditModal type={editState.type} entity={editState.entity} onSave={handleSave} onClose={closeEdit} projects={projects}/>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
